  <link rel="stylesheet" href="./pacientes.css">
</head>
<body>
  <div class="page">

    <aside class="sidebar">
  <h2>Clínica</h2>
  <ul>
    <li><a href="../../dashboard.html">Dashboard</a></li>

    <main class="main-content">
      <div class="topbar">
        <strong>Módulo de Pacientes</strong>
      </div>

      <div class="page-header">
        <h1>Cadastro de Pacientes</h1>
        <p>Cadastre, edite e acompanhe os pacientes da clínica.</p>
      </div>

      <div class="card form-card">
        <form id="form-paciente">
          <div class="form-grid">
            <div class="form-group">
              <label for="nome">Nome completo</label>
              <input type="text" id="nome" class="input" placeholder="Digite o nome do paciente">
            </div>

            <div class="form-group">
              <label for="cpf">CPF</label>
              <input type="text" id="cpf" class="input" placeholder="000.000.000-00">
            </div>

            <div class="form-group">
              <label for="telefone">Telefone</label>
              <input type="text" id="telefone" class="input" placeholder="(00) 00000-0000">
            </div>

            <div class="form-group">
              <label for="nascimento">Data de nascimento</label>
              <input type="date" id="nascimento" class="input">
            </div>

            <div class="form-group">
              <label for="convenio">Convênio</label>
              <input type="text" id="convenio" class="input" placeholder="Ex: Unimed, Particular">
            </div>

            <div class="form-group">
              <label for="status">Status</label>
              <select id="status" class="input">
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="observacoes">Observações</label>
            <textarea id="observacoes" class="input textarea" placeholder="Informações adicionais sobre o paciente"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" id="btn-salvar-paciente">Salvar Paciente</button>
        </form>
      </div>

      <h2 class="section-title">Pacientes Cadastrados</h2>

      <div class="table-box">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>CPF</th>
              <th>Telefone</th>
              <th>Convênio</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="lista-pacientes"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../../assets/js/auth.js"></script>

    protegerPagina();
  </script>

</body>
